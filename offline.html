<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline — Neutralizam</title>
  <style>
    :root { --bg:#0B0D12; --surface:#131620; --gold:#C9A84C; --text:#E5E3DE; --text-sub:#7A7870; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'DM Sans', system-ui, sans-serif;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; text-align:center; padding:2rem;
    }
    .container { max-width:460px; }
    .emblem {
      width:80px; height:80px; border-radius:50%;
      border:1px solid var(--gold); display:flex;
      align-items:center; justify-content:center;
      margin:0 auto 2rem; font-size:2rem; color:var(--gold);
      font-family:'Playfair Display', Georgia, serif;
    }
    h1 { font-size:1.8rem; color:var(--text); margin-bottom:0.75rem; font-family:'Playfair Display', Georgia, serif; }
    p { color:var(--text-sub); line-height:1.7; margin-bottom:1.5rem; }
    a {
      display:inline-block; padding:0.7rem 1.8rem;
      border:1px solid var(--gold); color:var(--gold);
      text-decoration:none; border-radius:2px; font-size:0.9rem;
      transition:background 0.2s;
    }
    a:hover { background:rgba(201,168,76,0.1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="emblem">N</div>
    <h1>Nema internet veze</h1>
    <p>Stranica nije dostupna bez interneta. Provjeri vezu i pokušaj ponovo.</p>
    <a href="/" onclick="location.reload();return false;">Pokušaj ponovo</a>
  </div>
</body>
</html>
