<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neutralizam — Offline</title>
  <style>
    :root {
      --bg: #0B0D12; --gold: #C9A84C; --gold-dim: #8A7035;
      --text: #E5E3DE; --text-sub: #7A7870;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; text-align: center; padding: 2rem;
    }
    .emblem {
      position: relative; width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem;
    }
    .ring {
      position: absolute; border-radius: 50%; border: 1px solid;
      animation: spin linear infinite;
    }
    .ring1 { width: 80px; height: 80px; border-color: rgba(201,168,76,0.3); animation-duration: 20s; }
    .ring2 { width: 56px; height: 56px; border-color: rgba(201,168,76,0.2); animation-duration: 14s; animation-direction: reverse; }
    .ring3 { width: 36px; height: 36px; border-color: rgba(201,168,76,0.4); animation-duration: 9s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .n {
      font-family: Georgia, serif; font-size: 1.75rem; font-weight: 700;
      color: var(--gold); position: relative; z-index: 1;
    }
    h1 {
      font-family: Georgia, serif; font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 600; color: var(--text); margin-bottom: 1rem; line-height: 1.2;
    }
    p { color: var(--text-sub); font-size: 1rem; line-height: 1.7; max-width: 420px; margin: 0 auto 2rem; }
    .btn {
      display: inline-block; background: var(--gold); color: var(--bg);
      border: none; padding: 0.85rem 2.5rem; border-radius: 4px;
      cursor: pointer; font-size: 0.9rem; font-weight: 500;
      text-decoration: none; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .note { display: block; margin-top: 1.25rem; color: var(--text-sub); font-size: 0.78rem; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div>
    <div class="emblem">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <span class="n">N</span>
    </div>
    <h1>Nema internet veze</h1>
    <p>Stranica nije dostupna bez interneta. Provjeri vezu i pokušaj ponovo — ili otvori stranicu kad budeš online.</p>
    <button class="btn" onclick="window.location.reload()">Pokušaj ponovo</button>
    <span class="note">neutralizam.eu</span>
  </div>
</body>
</html>
